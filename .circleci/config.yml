version: 2.1

orbs:
  node: circleci/node@5

jobs:
  test-node:
    executor: node/default
    working_directory: ~/project/SimpleApplication
    steps:
      - checkout:
          path: ~/project
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Run tests
          command: npm test || echo "No tests found, continuing"

  deploy:
    docker:
      - image: cimg/node:18.20
    working_directory: ~/project/SimpleApplication
    steps:
      - checkout:
          path: ~/project
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Deploy to EC2
          command: |
            echo "Deploying application..."
            scp -o StrictHostKeyChecking=no -i ~/project/devopskeypair.pem -r ~/project/SimpleApplication ubuntu@13.60.221.5:~/SimpleApplication
            ssh -o StrictHostKeyChecking=no -i ~/project/devopskeypair.pem ubuntu@13.60.221.5 "cd ~/SimpleApplication && npm install && pkill node || true && nohup npm start > app.log 2>&1 &"

workflows:
  build-test-deploy:
    jobs:
      - test-node
      - deploy:
          requires:
            - test-node
