version: 2.1

orbs:
  node: circleci/node@5

jobs:
  test-node:
    executor: node/default
    working_directory: ~/project/SimpleApplication
    steps:
      - checkout:
          path: ~/project

      - node/install-packages:
          pkg-manager: npm

      - run:
          name: Run tests
          command: npm test --passWithNoTests

  deploy:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project/SimpleApplication
    steps:
      - checkout:
          path: ~/project

      - run:
          name: Install dependencies
          command: npm install

      - run:
          name: Build application
          command: npm run build || echo "No build step"

      - run:
          name: Deploy application
          command: |
            echo "Deploying application..."
            # Example deployment command
            # Replace this with your hosting platform deployment

workflows:
  build-test-deploy:
    jobs:
      - test-node
      - deploy:
          requires:
            - test-node